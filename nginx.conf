# Nginx 配置模板 - 放在 /etc/nginx/sites-available/ziyuanzhan
# 修改 YOUR_DOMAIN 为你的域名

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # 上传文件大小限制
    client_max_body_size 100M;

    # 日志
    access_log /var/log/nginx/ziyuanzhan_access.log;
    error_log /var/log/nginx/ziyuanzhan_error.log;

    # 上传文件直接由 Nginx 提供
    location /uploads/ {
        alias /home/你的用户名/ziyuanzhan/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Next.js 静态资源
    location /_next/static {
        alias /home/你的用户名/ziyuanzhan/.next/static;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # 所有请求转发到 Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# SSL 配置（用 Let's Encrypt 自动配置）
# sudo apt install certbot python3-certbot-nginx
# sudo certbot --nginx -d YOUR_DOMAIN
